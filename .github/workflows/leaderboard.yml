name: ML Leaderboard

on:
  pull_request:
    branches: [submissions]
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-score-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-score-
            ${{ runner.os }}-cargo-

      - name: Compile check
        run: cargo check

      - name: Run scorer
        id: score
        run: |
          OUTPUT=$(cargo run --bin score --release 2>/dev/null)
          echo "json=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Post leaderboard comment
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- ml-leaderboard -->';
            const thisScore = JSON.parse('${{ steps.score.outputs.json }}');
            const thisScoreBlock = `<!-- score:${JSON.stringify(thisScore)} -->`;

            // Collect scores from all open PRs
            const scores = [];
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            for (const pr of prs) {
              if (pr.number === context.issue.number) {
                scores.push({
                  pr: pr.number,
                  author: pr.user.login,
                  ...thisScore,
                });
                continue;
              }
              // Find leaderboard comment on other PRs
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });
              for (const comment of comments) {
                if (comment.body && comment.body.includes(MARKER)) {
                  const match = comment.body.match(/<!-- score:({.*?}) -->/);
                  if (match) {
                    try {
                      const s = JSON.parse(match[1]);
                      scores.push({
                        pr: pr.number,
                        author: pr.user.login,
                        ...s,
                      });
                    } catch {}
                  }
                  break;
                }
              }
            }

            // Sort by accuracy descending
            scores.sort((a, b) => b.accuracy - a.accuracy);

            // Build leaderboard table
            const medals = ['🥇', '🥈', '🥉'];
            let table = '| Rank | PR | Author | Model | Accuracy |\n';
            table += '|------|------|--------|-------|----------|\n';
            for (let i = 0; i < scores.length; i++) {
              const s = scores[i];
              const rank = i < 3 ? medals[i] : `${i + 1}`;
              const isYou = s.pr === context.issue.number ? ' **<- you**' : '';
              table += `| ${rank} | #${s.pr} | @${s.author} | ${s.model_name} | ${(s.accuracy * 100).toFixed(1)}%${isYou} |\n`;
            }

            const pct = (thisScore.accuracy * 100).toFixed(1);
            const body = [
              MARKER,
              thisScoreBlock,
              '',
              '## ML Leaderboard',
              '',
              `**Your score: ${pct}%** (${thisScore.correct}/${thisScore.total} correct) | Model: ${thisScore.model_name}`,
              '',
              table,
              `*Scored on Iris dataset with fixed seed (1). Only linfa algorithms allowed.*`,
            ].join('\n');

            // Find existing leaderboard comment
            const { data: existingComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = existingComments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
