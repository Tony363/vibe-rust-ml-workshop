name: ML Leaderboard

on:
  pull_request_target:
    branches: [submissions]
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-score-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-score-
            ${{ runner.os }}-cargo-

      - name: Compile check
        run: cargo check

      - name: Run Iris scorer
        id: score_iris
        run: |
          OUTPUT=$(cargo run --bin score --release)
          echo "json=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Run Wine scorer
        id: score_wine
        run: |
          OUTPUT=$(cargo run --bin score_wine --release)
          echo "json=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Post leaderboard comment
        uses: actions/github-script@v7
        env:
          IRIS_JSON: ${{ steps.score_iris.outputs.json }}
          WINE_JSON: ${{ steps.score_wine.outputs.json }}
        with:
          script: |
            const MARKER = '<!-- ml-leaderboard -->';
            const irisScore = JSON.parse(process.env.IRIS_JSON);
            const wineScore = JSON.parse(process.env.WINE_JSON);
            const combinedScore = { iris: irisScore, wine: wineScore };
            const thisScoreBlock = `<!-- score:${JSON.stringify(combinedScore)} -->`;

            // Collect scores from all open PRs
            const irisScores = [];
            const wineScores = [];
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'submissions',
            });

            for (const pr of prs) {
              if (pr.number === context.issue.number) {
                irisScores.push({ pr: pr.number, author: pr.user.login, ...irisScore });
                wineScores.push({ pr: pr.number, author: pr.user.login, ...wineScore });
                continue;
              }
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });
              for (const comment of comments) {
                if (comment.body && comment.body.includes(MARKER)) {
                  const match = comment.body.match(/<!-- score:({.*?}) -->/);
                  if (match) {
                    try {
                      const s = JSON.parse(match[1]);
                      if (s.iris) {
                        irisScores.push({ pr: pr.number, author: pr.user.login, ...s.iris });
                        wineScores.push({ pr: pr.number, author: pr.user.login, ...s.wine });
                      } else {
                        // Backwards compat: old format was just iris
                        irisScores.push({ pr: pr.number, author: pr.user.login, ...s });
                      }
                    } catch {}
                  }
                  break;
                }
              }
            }

            function buildSection(title, dataset, thisScore, scores, baselineAcc) {
              scores.sort((a, b) => b.accuracy - a.accuracy);
              const medals = ['🥇', '🥈', '🥉'];
              let table = '| Rank | PR | Author | Model | Accuracy |\n';
              table += '|------|------|--------|-------|----------|\n';
              for (let i = 0; i < scores.length; i++) {
                const s = scores[i];
                const rank = i < 3 ? medals[i] : `${i + 1}`;
                const isYou = s.pr === context.issue.number ? ' **<- you**' : '';
                table += `| ${rank} | #${s.pr} | @${s.author} | ${s.model_name} | ${(s.accuracy * 100).toFixed(1)}%${isYou} |\n`;
              }

              const pct = (thisScore.accuracy * 100).toFixed(1);
              const baseline = { model_name: 'Baseline', accuracy: baselineAcc };
              const chartEntries = [...scores, baseline];
              chartEntries.sort((a, b) => b.accuracy - a.accuracy);
              const chartLabels = chartEntries.map(s => {
                const label = s.model_name.length > 20
                  ? s.model_name.substring(0, 18) + '..'
                  : s.model_name;
                return `"${label}"`;
              });
              const chartValues = chartEntries.map(s => (s.accuracy * 100).toFixed(1));
              const chart = [
                '```mermaid',
                'xychart-beta horizontal',
                `  title "${dataset} Accuracy (%)"`,
                `  x-axis [${chartLabels.join(', ')}]`,
                `  bar [${chartValues.join(', ')}]`,
                '```',
              ].join('\n');

              let cmSection = '';
              if (thisScore.confusion_matrix) {
                const cm = thisScore.confusion_matrix;
                const classes = thisScore.classes || [];
                cmSection = [
                  '',
                  `<details><summary>Confusion Matrix</summary>`,
                  '',
                  `| Actual \\ Predicted | ${classes.join(' | ')} |`,
                  `|---|${classes.map(() => '---:').join('|')}|`,
                  ...classes.map((name, i) =>
                    `| **${name}** | ${cm[i].join(' | ')} |`
                  ),
                  '',
                  '</details>',
                ].join('\n');
              }

              let metricsSection = '';
              if (thisScore.per_class) {
                metricsSection = [
                  '',
                  `<details><summary>Per-Class Metrics</summary>`,
                  '',
                  '| Class | Precision | Recall | F1 Score | Support |',
                  '|-------|----------:|-------:|---------:|--------:|',
                  ...thisScore.per_class.map(c =>
                    `| ${c.name} | ${(c.precision * 100).toFixed(1)}% | ${(c.recall * 100).toFixed(1)}% | ${(c.f1 * 100).toFixed(1)}% | ${c.support} |`
                  ),
                  '',
                  '</details>',
                ].join('\n');
              }

              return [
                `### ${title}`,
                '',
                `**Your score: ${pct}%** (${thisScore.correct}/${thisScore.total} correct) | Model: ${thisScore.model_name}`,
                '',
                chart,
                '',
                '#### Rankings',
                '',
                table,
                cmSection,
                metricsSection,
              ].join('\n');
            }

            const irisSection = buildSection(
              '🌸 Iris (Easy)', 'Iris', irisScore, irisScores, 0.9333
            );
            const wineSection = buildSection(
              '🍷 Wine Quality (Hard)', 'Wine Quality', wineScore, wineScores, 0.5392
            );

            const body = [
              MARKER,
              thisScoreBlock,
              '',
              '## ML Leaderboard',
              '',
              irisSection,
              '',
              '---',
              '',
              wineSection,
              '',
              `*Scored with fixed seed (1). Only linfa algorithms allowed.*`,
            ].join('\n');

            const { data: existingComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = existingComments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
