name: ML Leaderboard

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-score-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-score-
            ${{ runner.os }}-cargo-

      - name: Compile check
        run: cargo check

      - name: Run scorer
        id: score
        run: |
          OUTPUT=$(cargo run --bin score --release 2>/dev/null)
          echo "json=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Post leaderboard comment
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- ml-leaderboard -->';
            const thisScore = JSON.parse('${{ steps.score.outputs.json }}');
            // Store only lightweight fields in the hidden score block (other PRs only need these)
            const scoreForBlock = {
              accuracy: thisScore.accuracy,
              correct: thisScore.correct,
              total: thisScore.total,
              model_name: thisScore.model_name,
            };
            const thisScoreBlock = `<!-- score:${JSON.stringify(scoreForBlock)} -->`;

            // Collect scores from all open PRs
            const scores = [];
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            for (const pr of prs) {
              if (pr.number === context.issue.number) {
                scores.push({
                  pr: pr.number,
                  author: pr.user.login,
                  ...scoreForBlock,
                });
                continue;
              }
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });
              for (const comment of comments) {
                if (comment.body && comment.body.includes(MARKER)) {
                  const match = comment.body.match(/<!-- score:({.*?}) -->/);
                  if (match) {
                    try {
                      const s = JSON.parse(match[1]);
                      scores.push({
                        pr: pr.number,
                        author: pr.user.login,
                        ...s,
                      });
                    } catch {}
                  }
                  break;
                }
              }
            }

            // Sort by accuracy descending
            scores.sort((a, b) => b.accuracy - a.accuracy);

            // === Leaderboard Table ===
            const medals = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];
            let table = '| Rank | PR | Author | Model | Accuracy |\n';
            table += '|------|------|--------|-------|----------|\n';
            for (let i = 0; i < scores.length; i++) {
              const s = scores[i];
              const rank = i < 3 ? medals[i] : `${i + 1}`;
              const isYou = s.pr === context.issue.number ? ' **<- you**' : '';
              table += `| ${rank} | #${s.pr} | @${s.author} | ${s.model_name} | ${(s.accuracy * 100).toFixed(1)}%${isYou} |\n`;
            }

            // === Visualization 1: Leaderboard Accuracy Chart ===
            let leaderboardChart = '';
            if (scores.length > 0) {
              const authors = scores.map(s => `"@${s.author}"`).join(', ');
              const accs = scores.map(s => (s.accuracy * 100).toFixed(1)).join(', ');
              const minAcc = Math.max(0, Math.floor(Math.min(...scores.map(s => s.accuracy * 100)) - 5));
              leaderboardChart = [
                '### Leaderboard Chart',
                '',
                '```mermaid',
                'xychart-beta',
                '  title "Accuracy by Participant"',
                `  x-axis [${authors}]`,
                `  y-axis "Accuracy %" ${minAcc} --> 100`,
                `  bar [${accs}]`,
                '```',
              ].join('\n');
            }

            // === Visualization 2: Per-Class Accuracy Bars ===
            const perClass = thisScore.per_class || [];
            let perClassChart = '';
            if (perClass.length > 0) {
              const classNames = perClass.map(c => `"${c.name}"`).join(', ');
              const classAccs = perClass.map(c =>
                c.total > 0 ? ((c.correct / c.total) * 100).toFixed(1) : '0.0'
              ).join(', ');
              perClassChart = [
                '### Per-Class Accuracy',
                '',
                '```mermaid',
                'xychart-beta',
                '  title "Accuracy by Iris Class"',
                `  x-axis [${classNames}]`,
                '  y-axis "Accuracy %" 0 --> 100',
                `  bar [${classAccs}]`,
                '```',
              ].join('\n');
            }

            // === Visualization 3: Prediction Breakdown (Pie) ===
            const incorrect = thisScore.total - thisScore.correct;
            let pieChart = [
              '### Prediction Breakdown',
              '',
              '```mermaid',
              'pie title Prediction Results',
              `  "Correct (${thisScore.correct})" : ${thisScore.correct}`,
              `  "Incorrect (${incorrect})" : ${incorrect}`,
              '```',
            ].join('\n');

            // === Visualization 4: Confusion Matrix Heatmap ===
            const cm = thisScore.confusion_matrix || [];
            const classLabels = (perClass.length > 0)
              ? perClass.map(c => c.name)
              : ['Class 0', 'Class 1', 'Class 2'];
            let cmTable = '';
            if (cm.length === 3) {
              cmTable = '### Confusion Matrix\n\n';
              cmTable += `| | **Pred: ${classLabels[0]}** | **Pred: ${classLabels[1]}** | **Pred: ${classLabels[2]}** |\n`;
              cmTable += '|---|:---:|:---:|:---:|\n';
              for (let i = 0; i < 3; i++) {
                let row = `| **${classLabels[i]}** |`;
                for (let j = 0; j < 3; j++) {
                  const val = cm[i][j];
                  // Diagonal = correct (green), off-diagonal with value = misclassified (red)
                  if (i === j) {
                    row += val > 0 ? ` \u{1F7E9} ${val} |` : ` ${val} |`;
                  } else {
                    row += val > 0 ? ` \u{1F7E5} ${val} |` : ` \u{2022} |`;
                  }
                }
                cmTable += row + '\n';
              }
            }

            // === Assemble full comment body ===
            const pct = (thisScore.accuracy * 100).toFixed(1);
            const body = [
              MARKER,
              thisScoreBlock,
              '',
              '## ML Leaderboard',
              '',
              `**Your score: ${pct}%** (${thisScore.correct}/${thisScore.total} correct) | Model: ${thisScore.model_name}`,
              '',
              table,
              '---',
              '',
              '## Model Performance',
              '',
              leaderboardChart,
              '',
              perClassChart,
              '',
              pieChart,
              '',
              cmTable,
              '',
              `*Scored on Iris dataset with fixed seed (42). Only linfa algorithms allowed.*`,
            ].join('\n');

            // Find existing leaderboard comment
            const { data: existingComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = existingComments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
