name: ML Leaderboard

on:
  pull_request:
    branches: [submissions]
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-score-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-score-
            ${{ runner.os }}-cargo-

      - name: Compile check
        run: cargo check

      - name: Run scorer
        id: score
        run: |
          OUTPUT=$(cargo run --bin score --release)
          echo "json=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Post leaderboard comment
        uses: actions/github-script@v7
        env:
          SCORE_JSON: ${{ steps.score.outputs.json }}
        with:
          script: |
            const MARKER = '<!-- ml-leaderboard -->';
            const thisScore = JSON.parse(process.env.SCORE_JSON);
            const thisScoreBlock = `<!-- score:${JSON.stringify(thisScore)} -->`;

            // Collect scores from all open PRs
            const scores = [];
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'submissions',
            });

            for (const pr of prs) {
              if (pr.number === context.issue.number) {
                scores.push({
                  pr: pr.number,
                  author: pr.user.login,
                  ...thisScore,
                });
                continue;
              }
              // Find leaderboard comment on other PRs
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });
              for (const comment of comments) {
                if (comment.body && comment.body.includes(MARKER)) {
                  const match = comment.body.match(/<!-- score:({.*?}) -->/);
                  if (match) {
                    try {
                      const s = JSON.parse(match[1]);
                      scores.push({
                        pr: pr.number,
                        author: pr.user.login,
                        ...s,
                      });
                    } catch {}
                  }
                  break;
                }
              }
            }

            // Sort by accuracy descending
            scores.sort((a, b) => b.accuracy - a.accuracy);

            // Build leaderboard table
            const medals = ['🥇', '🥈', '🥉'];
            let table = '| Rank | PR | Author | Model | Accuracy |\n';
            table += '|------|------|--------|-------|----------|\n';
            for (let i = 0; i < scores.length; i++) {
              const s = scores[i];
              const rank = i < 3 ? medals[i] : `${i + 1}`;
              const isYou = s.pr === context.issue.number ? ' **<- you**' : '';
              table += `| ${rank} | #${s.pr} | @${s.author} | ${s.model_name} | ${(s.accuracy * 100).toFixed(1)}%${isYou} |\n`;
            }

            const pct = (thisScore.accuracy * 100).toFixed(1);

            // Build accuracy comparison chart
            const baseline = { model_name: 'Baseline', accuracy: 0.9333 };
            const chartEntries = [...scores, baseline];
            chartEntries.sort((a, b) => b.accuracy - a.accuracy);
            const chartLabels = chartEntries.map(s => {
              const label = s.model_name.length > 20
                ? s.model_name.substring(0, 18) + '..'
                : s.model_name;
              return `"${label}"`;
            });
            const chartValues = chartEntries.map(s => (s.accuracy * 100).toFixed(1));
            const chart = [
              '```mermaid',
              'xychart-beta horizontal',
              '  title "Accuracy Comparison (%)"',
              `  x-axis [${chartLabels.join(', ')}]`,
              `  bar [${chartValues.join(', ')}]`,
              '```',
            ].join('\n');

            // Build confusion matrix table
            let cmSection = '';
            if (thisScore.confusion_matrix) {
              const cm = thisScore.confusion_matrix;
              const classes = thisScore.classes || ['Setosa', 'Versicolor', 'Virginica'];
              cmSection = [
                '',
                '### Confusion Matrix',
                '',
                `| Actual \\ Predicted | ${classes.join(' | ')} |`,
                `|---|${classes.map(() => '---:').join('|')}|`,
                ...classes.map((name, i) =>
                  `| **${name}** | ${cm[i].join(' | ')} |`
                ),
              ].join('\n');
            }

            // Build per-class metrics table
            let metricsSection = '';
            if (thisScore.per_class) {
              metricsSection = [
                '',
                '### Per-Class Metrics',
                '',
                '| Class | Precision | Recall | F1 Score | Support |',
                '|-------|----------:|-------:|---------:|--------:|',
                ...thisScore.per_class.map(c =>
                  `| ${c.name} | ${(c.precision * 100).toFixed(1)}% | ${(c.recall * 100).toFixed(1)}% | ${(c.f1 * 100).toFixed(1)}% | ${c.support} |`
                ),
              ].join('\n');
            }

            const body = [
              MARKER,
              thisScoreBlock,
              '',
              '## ML Leaderboard',
              '',
              `**Your score: ${pct}%** (${thisScore.correct}/${thisScore.total} correct) | Model: ${thisScore.model_name}`,
              '',
              chart,
              '',
              '### Rankings',
              '',
              table,
              cmSection,
              metricsSection,
              '',
              `*Scored on Iris dataset with fixed seed (1). Only linfa algorithms allowed.*`,
            ].join('\n');

            // Find existing leaderboard comment
            const { data: existingComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = existingComments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
